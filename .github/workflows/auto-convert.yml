name: Update Anywhere rules

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 04:18 Asia/Shanghai.
    - cron: "18 20 * * *"

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install maxminddb

      - name: Convert upstream rules
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/convert_blackmatrix7.py
          python scripts/build_common_rules.py
          python scripts/build_geoip_cn.py

      - name: Commit generated rules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules
          if git diff --cached --quiet; then
            echo "No rule updates."
          else
            git commit -m "Update $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi