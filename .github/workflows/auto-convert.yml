name: Automatic Rule Convert

on:
  push:
    branches:
      - main
  schedule:
    - cron: '18 20 * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Verify Script Exists
        run: |
          if [ ! -f convert.py ]; then
            echo "Error: convert.py not found!"
            exit 1
          fi

      - name: Run Converter
        run: python convert.py

      - name: Debug: List Repository Files
        run: ls -R rules || echo "No rules directory found"

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if ls rules/common/*.arrs 2>/dev/null; then
              git add rules/common/*.arrs
              git diff --staged --quiet || (git commit -m "Auto update rules" && git push)
          else
              echo "No change to commit."
          fi